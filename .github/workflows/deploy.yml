name: Auto Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
        - name: Deploy to VPS
          uses: appleboy/ssh-action@master
          with:
                  host: ${{ secrets.REMOTE_HOST }}
                  username: ${{ secrets.REMOTE_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  port: 2222
                  script: |
                    cd /testweb/
                    git pull origin main

                    cd Backend
                    pm2 restart backend || pm2 start api.js --name backend

                    cd ../Frontend
