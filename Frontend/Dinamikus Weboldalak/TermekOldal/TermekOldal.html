<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TermekOldal</title>
        <link rel="stylesheet" href="../kellékek/bootstrap-5.2.3-dist/css/bootstrap.min.css" />
        <link rel="stylesheet" href="../kellékek/NavBar.css" />
        <link rel="stylesheet" href="../kellékek/universalCSS.css" />
        <link rel="stylesheet" href="../kellékek/lightTheme.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
        />
        <link rel="stylesheet" href="../TermekOldal/TermekOldal.css" />
    </head>
    <body>
        <nav class="navbar navbar-expand-lg bg-body-tertiary hatter">
            <div class="container-fluid hatter">
                <div class="navbar-brand">
                    <a class="navbar-brand" id="marka" href="#">Pohárnyi</a>
                    <p id="alszoveg">Az online koktélbár</p>
                </div>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsable">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="navbar-collapse collapse justify-content-between" id="collapsable">
                    <div class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active jelenlegi" href="/Fooldal" aria-current="page">Főoldal</a>
                        </li>
                        <li class="nav-item">
                            <a href="/Koktelok" class="nav-link">Koktelok</a>
                        </li>
                    </div>
                    <div class="navbar-nav d-flex align-items-center">
                        <input type="button" value="" id="ThemeSwitcher" />
                        <a href="/Regisztralj" id="regisztracio">
                            <input type="button" class="btn btn-secondary nav-item mx-2" value="Regisztárció" />
                        </a>
                        <a href="/LepjBe" id="belepes">
                            <input type="button" class="btn btn-warning nav-item" value="Bejelentkezés" />
                        </a>

                        <a href="/Keszites" id="sajatKoktelKeszites" hidden>
                            <input
                                type="button"
                                class="nav-item btn btn-warning mx-2"
                                value="Saját koktél létrehozása"
                            />
                        </a>
                        <div class="nav-item dropdown" id="dropdownMenu" hidden>
                            <img
                                class="nav-link dropdown-toggle profil"
                                data-bs-toggle="dropdown"
                                role="button"
                                aria-expanded="false"
                            />
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li class="dropdown-item"><a href="/Adatlap">Adatlap</a></li>
                                <li class="dropdown-item" id="adminPanelHref"><a href="/AdminPanel">Admin Panel</a></li>
                                <li class="dropdown-item"><a href="/Kijelentkezes">Kijelentkezes</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <main>
            <div id="main">
                <div id="TermekAdatok">
                    <div id="TermekCimDiv">
                        <h2 id="TermekCim"></h2>
                    </div>
                    <div id="TermekAdatokMainContent">
                        <div id="TermekKep">
                            <img class="img-fluid" id="TermekImg" alt="koktelPic" />
                        </div>
                        <div id="TermekLeiras">
                            <div id="TermekSzovegDiv">
                                <p id="TermekSzoveg"></p>
                            </div>

                            <div id="Tulajdonsagok">
                                <div id="TulGomb">
                                    <button type="button" class="TovGomb" id="Tbtn">adatok</button>
                                    <div class="content" id="TulContent">
                                        <table id="Tablazat"></table>
                                    </div>
                                </div>
                            </div>

                            <div id="hasonloTermekek">
                                <h2>Hasonló Termékek</h2>

                                <div id="TermekSor"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="MegrendelesDiv">
                    <div id="VanePolcon">
                        <p id="VaneSzoveg">Raktáron</p>
                    </div>
                    <div id="ar">
                        <h1 id="arHely">67Ft</h1>
                        <p id="LiterAr">egységár ft/L: (dinamikus ár)</p>
                    </div>
                    <div id="KosarDiv">
                        <div id="mennyiseg">
                            <input type="number" id="mennyisegInput" class="form-control" min="1" max="100" />
                        </div>

                        <button id="kosarba" type="button">Kosárba</button>
                    </div>
                    <div id="Ertekeles">
                        <h2 id="ertekelesCim">Értékelés</h2>
                        <div id="csillagok">
                            <input type="button" value="☆" id="star1" class="btn fs-1 p-0 border-0 csillag" />
                            <input type="button" value="☆" id="star2" class="btn fs-1 p-0 border-0 csillag" />
                            <input type="button" value="☆" id="star3" class="btn fs-1 p-0 border-0 csillag" />
                            <input type="button" value="☆" id="star4" class="btn fs-1 p-0 border-0 csillag" />
                            <input type="button" value="☆" id="star5" class="btn fs-1 p-0 border-0 csillag" />
                        </div>
                        <button type="button" id="ErtekelesKuldes" value="">Küldés</button>
                        <p id="ErtekelPar">Kérjük értékelje a terméket!</p>
                    </div>
                </div>
            </div>
        </main>
        <script src="../kellékek/bootstrap-5.2.3-dist/js/bootstrap.bundle.min.js"></script>
        <script src="../kellékek/themeSwitcher.js"></script>
        <script src="../kellékek/navBar.js"></script>
        <script src="../TermekOldal/TermekOldal.js"></script>
    </body>
</html>
