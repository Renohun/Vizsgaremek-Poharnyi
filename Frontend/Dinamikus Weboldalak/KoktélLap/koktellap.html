<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title id="OldalCim">Document</title>
        <link rel="stylesheet" href="../kellékek/bootstrap-5.2.3-dist/css/bootstrap.min.css" />
        <link rel="stylesheet" href="../kellékek/NavBar.css" />
        <link rel="stylesheet" href="../kellékek/lightTheme.css" />
        <link rel="stylesheet" href="../koktellap.css" />
        <link rel="stylesheet" href="../kellékek/universalCSS.css" />
    </head>
    <body>
        <nav class="navbar navbar-expand-lg bg-body-tertiary hatter">
            <div class="container-fluid hatter">
                <div class="navbar-brand">
                    <a class="navbar-brand" id="marka" href="#">Pohárnyi</a>
                    <p id="alszoveg">Az online koktélbár</p>
                </div>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsable">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="navbar-collapse collapse justify-content-between" id="collapsable">
                    <div class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active jelenlegi" href="/Fooldal" aria-current="page">Főoldal</a>
                        </li>
                        <li class="nav-item">
                            <a href="/Koktelok" class="nav-link">Koktelok</a>
                        </li>
                    </div>
                    <div class="navbar-nav d-flex align-items-center">
                        <input type="button" value="" id="ThemeSwitcher" />
                        <a href="/Regisztralj" id="regisztracio">
                            <input type="button" class="btn btn-secondary nav-item mx-2" value="Regisztárció" />
                        </a>
                        <a href="/LepjBe" id="belepes">
                            <input type="button" class="btn btn-warning nav-item" value="Bejelentkezés" />
                        </a>

                        <a href="/Keszites" id="sajatKoktelKeszites" hidden>
                            <input
                                type="button"
                                class="nav-item btn btn-warning mx-2"
                                value="Saját koktél létrehozása"
                            />
                        </a>
                        <div class="nav-item dropdown" id="dropdownMenu" hidden>
                            <img
                                class="nav-link dropdown-toggle profil"
                                data-bs-toggle="dropdown"
                                role="button"
                                aria-expanded="false"
                            />
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li class="dropdown-item"><a href="/Adatlap">Adatlap</a></li>
                                <li class="dropdown-item" id="adminPanelHref"><a href="/AdminPanel">Admin Panel</a></li>
                                <li class="dropdown-item"><a href="/Kijelentkezes">Kijelentkezes</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
        <div class="container">
            <div class="border-bottom border-2 border-dark text-center" id="header">
                <h1><span id="Cimsor" class="ps-4"></span><span id="fav" class="float-end"></span></h1>
                <span id="kokteldate"></span>
                <div id="badgek"></div>
                <input type="button" id="KoktJel" class="btn text-danger border-0" value="Koktél Jelentése" />
            </div>
            <div class="row border-bottom border-2 border-dark pb-3">
                <p class="fs-4" id="maker">
                    Készítette: <img src="" id="keszKep" /> <span id="Madeby"></span>
                    <span id="Tagsag" class="text-primary"></span
                    ><input type="button" id="FelhJel" class="btn text-danger border-0" value="Jelentés" />
                </p>
                <div class="col-12 col-sm-12 col-md-12 col-lg-6 col-xl-6 row">
                    <img
                        src=""
                        alt="KoktélKép"
                        id="KoktélKép"
                        class="img-fluid col-12 col-sm-6 col-md-6 col-lg-6 rounded"
                    />
                    <div class="ps-4 flex-column col-12 col-sm-6 col-md-6 col-lg-6">
                        <label for="mennyiseg">Hány ml-nyit szeretne készíteni</label>
                        <input type="number" id="mennyiseg" step="5" class="form-control" min="0" />
                        <span class="fs-4">Összetevők</span>
                        <ul id="Ossztev"></ul>
                    </div>
                </div>
                <div class="col-12 col-sm-12 col-md-12 col-lg-6 col-xl-6">
                    <div class="text-break" id="recept"></div>
                </div>
            </div>
            <div class="col-md-12 d-flex flex-column mt-4 p-0 text-center fs-4" id="Velemeny">
                <div>
                    <label for="rate" id="rateDisplay">Értékelje a Koktélt</label>
                    <!-- ⯨ ★ ☆ -->
                    <div class="row">
                        <div id="csillagok">
                            <input type="button" value="☆" class="btn fs-1 p-0 border-0" />
                            <input type="button" value="☆" class="btn fs-1 p-0 border-0" />
                            <input type="button" value="☆" class="btn fs-1 p-0 border-0" />
                            <input type="button" value="☆" class="btn fs-1 p-0 border-0" />
                            <input type="button" value="☆" class="btn fs-1 p-0 border-0" />
                        </div>
                    </div>
                    <input type="button" value="Küldés" id="ErtSend" class="btn btn-success" />
                </div>

                <label for="komment">Írj Kommentet!</label>
                <textarea
                    class="w-100 border rounded form-control komment"
                    style="resize: none; text-align: left; box-sizing: border-box"
                    rows="3"
                    id="komment"
                    maxlength="300"
                    placeholder="Írd ide a véleményed!"
                ></textarea>
                <div class="p-0">
                    <input class="btn btn-success mt-1 float-end" type="button" value="Küldés" id="KommSend" />
                    <span class="float-end p-2"> <span id="szam">0</span>/300</span>
                </div>
            </div>
            <div>
                <div class="row mt-2">
                    <h1 class="border-bottom border-2 border-dark text-center">Kommentek</h1>
                </div>
                <div id="Kommentek" class="shadow-lg p-2"></div>
            </div>
        </div>

        <div class="modal" tabindex="-1" id="JelentesLap">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Jelentés Elküldése</h5>
                    </div>
                    <div class="modal-body">
                        <p id="visszajelzes"></p>
                        <label for="indok">Adja Meg Az Indokot:</label>
                        <textarea name="indok" id="indok" class="form-control" rows="4"></textarea>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" id="JelNvm">Mégse</button>
                        <button type="button" class="btn btn-primary" id="JelSend">Küldés</button>
                        <input
                            type="button"
                            value="Ok"
                            class="btn btn-success"
                            id="JelKonf"
                            hidden
                            data-bs-dismiss="modal"
                        />
                    </div>
                </div>
            </div>
        </div>

        <script src="../koktellap.js"></script>
        <script src="../kellékek/bootstrap-5.2.3-dist/js/bootstrap.bundle.min.js"></script>
        <script src="../kellékek/themeSwitcher.js"></script>
        <script src="../kellékek/navBar.js"></script>
    </body>
</html>
