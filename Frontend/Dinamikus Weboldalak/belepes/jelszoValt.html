<!doctype html>

    <head>

                    class="offcanvas offcanvas-end hatter"

                    tabindex="-1"

                        <a href="/Fooldal" class="navbar-brand"
                            ><h5 class="offcanvas-title" id="offcanvasDarkNavbarLabel">
                                Pohárnyi<br /><span id="alszoveg">Az online koktélbár</span>
                            </h5></a
                        >
                        <button
                            type="button"
                            class="btn-close btn-close-black"
                            data-bs-dismiss="offcanvas"
                            aria-label="Close"
                        ></button>
                    </div>
                    <div class="offcanvas-body">
                        <ul class="navbar-nav justify-content-end flex-grow-1 w-100">
                            <div id="leftSideNavBar">
                                <li class="nav-item">
                                    <a class="nav-link" href="/Fooldal" aria-current="page">Főoldal</a>
                                </li>
                                <li class="nav-item">
                                    <a href="/Koktelok " class="nav-link">Koktélok</a>
                                </li>
                                <li class="nav-item">
                                    <a href="/WebShop" class="nav-link">Webshop</a>
                                </li>
                                <li class="nav-item">
                                    <a href="/PolcKoktel" class="nav-link">Mi van a polcon?</a>
                                </li>
                            </div>
                            <div id="rightSideNavBar">
                                <li class="nav-item" id="dropdownMenuMini">
                                    <div class="nav-item dropdown" id="dropdownMenu" hidden>
                                        <a
                                            class="nav-link dropdown-toggle"
                                            role="button"
                                            data-bs-toggle="dropdown"
                                            aria-expanded="false"
                                            href="#"
                                            >Felhasználó</a
                                        >
                                        <ul class="dropdown-menu dropdown-menu-end hatter">
                                            <li class="dropdown-item">
                                                <a href="/Adatlap">Adatlap</a>
                                            </li>
                                            <hr class="dropdown-divider" />
                                            <li class="dropdown-item" id="adminPanelHref">
                                                <a href="/AdminPanel">Admin Panel</a>
                                            </li>
                                            <hr class="dropdown-divider" />
                                            <li class="dropdown-item"><a href="/Kijelentkezes">Kijelentkezés</a></li>
                                        </ul>
                                    </div>

                                <li class="nav-item">
                                    <div id="ThemeSwitcher">
                                        <img
                                            src="../kellékek/free-moon-icon-2304-thumb.png"
                                            id="themeSwitcherimg"
                                            style="height: 50px; width: 50px"
                                            alt=""
                                        />
                                    </div>
                                </li>
                                <li class="nav-item w-100">
                                    <a href="/Regisztralj" id="regisztracio">
                                        <input
                                            type="button"
                                            class="btn btn-secondary nav-item mt-2 w-100"
                                            value="Regisztráció"
                                        />

                                </li>
                                <li class="nav-item w-100">
                                    <a href="/LepjBe" id="belepes">

                                            type="button"
                                            class="btn btn-warning nav-item mt-2 w-100"
                                            value="Bejelentkezés"
                                        />
                                    </a>
                                </li>
                                <li class="nav-item w-100">
                                    <a href="/Keszites" id="sajatKoktelKeszites" hidden>
                                        <input
                                            type="button"
                                            class="nav-item btn btn-warning mt-2 w-100"
                                            value="Saját koktél létrehozása"
                                        />
                                    </a>
                                </li>
                                <li class="nav-item" id="dropdownMenuBig">
                                    <div class="nav-item dropdown" id="dropdownMenu" hidden>
                                        <img
                                            class="nav-link dropdown-toggle profil"
                                            data-bs-toggle="dropdown"
                                            role="button"
                                            aria-expanded="false"
                                        />
                                        <ul class="dropdown-menu dropdown-menu-end hatter">
                                            <li class="dropdown-item">
                                                <a href="/Adatlap">Adatlap</a>
                                            </li>
                                            <hr class="dropdown-divider" />

                            </div>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>

        <div class="container flex-grow-1">
            <div class="row my-5">
                <div class="col-md-12">
                    <div class="card shadow">
                        <div class="card-header text-center fw-bold">Jelszo változtatás</div>
                        <div class="card-body">
                            <form id="jelszoForm">
                                <label for="ujJelszo" class="form-label"
                                    >Adja meg a jelszavát (Kis és nagy betű, min.: 1 db szám és speciális
                                    karakter(#?!@$%^&*-))</label
                                >
                                <input type="password" id="ujJelszo" name="ujJelszo" class="form-control w-100" />
                                <label for="ujJelszoUjra" class="form-label">Új jelszo újra:</label>
                                <input
                                    type="password"
                                    class="form-control w-100"
                                    name="ujJelszoUjra"
                                    id="ujJelszoUjra"
                                />
                                <label for="megJelenit" class="form-label">Jelszó megjelenítése</label>
                                <input type="checkbox" name="megJelenit" id="megJelenit" />
                                <input
                                    type="button"
                                    value="Jelszó változtatás"
                                    id="jelszoValt"
                                    class="btn btn-success w-100 mt-2"
                                />
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal" tabindex="-1" id="infoModal">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="text-center mt-1">
                        <h5 id="modalText"></h5>
                    </div>
                    <div class="modal-footer">
                        <input type="button" id="modalBtn" value="Rendben" class="btn btn-success w-100" />
                    </div>
                </div>
            </div>

        <script src="../kellékek/footer.js"></script>
        <script src="../kellékek/bootstrap-5.2.3-dist/js/bootstrap.bundle.min.js"></script>
        <script src="../kellékek/themeSwitcher.js"></script>
        <script src="../kellékek/navBar.js"></script>
        <script src="../belepes/jelszoValt.js"></script>
        <script src="../belepes/jelszoValtjelszoMutatas.js"></script>
