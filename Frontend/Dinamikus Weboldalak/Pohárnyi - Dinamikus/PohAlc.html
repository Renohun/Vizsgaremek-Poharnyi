<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Pohárnyi | Koktélok</title>
        <link rel="stylesheet" href="../kellékek/bootstrap-5.2.3-dist/css/bootstrap.min.css" />
        <link rel="stylesheet" href="../kellékek/NavBar.css" />
        <link rel="stylesheet" href="../kellékek/universalCSS.css" />
        <link rel="stylesheet" href="../kellékek/lightTheme.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
        />
        <link rel="stylesheet" href="../Pohárnyi - Dinamikus/PohAlc.css" />
    </head>
    <body>
        <nav class="navbar navbar-expand-lg bg-body-tertiary hatter shadow">
            <div class="container-fluid hatter">
                <div class="navbar-brand">
                    <a class="navbar-brand" id="marka" href="/Fooldal">Pohárnyi</a>
                    <p id="alszoveg">Az online koktélbár</p>
                </div>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsable">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="navbar-collapse collapse justify-content-between" id="collapsable">
                    <div class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="/Fooldal" aria-current="page">Főoldal</a>
                        </li>
                        <li class="nav-item">
                            <a href="/Koktelok " class="nav-link active jelenlegi">Koktelok</a>
                        </li>
                        <li class="nav-item">
                            <a href="/WebShop" class="nav-link">Webshop</a>
                        </li>
                    </div>
                    <div class="navbar-nav d-flex align-items-center">
                        <div id="ThemeSwitcher">
                            <img
                                src="../kellékek/free-moon-icon-2304-thumb.png"
                                id="themeSwitcherimg"
                                style="height: 50px; width: 50px"
                                alt=""
                            />
                        </div>
                        <a href="/Regisztralj" id="regisztracio">
                            <input type="button" class="btn btn-secondary nav-item mx-2" value="Regisztárció" />
                        </a>
                        <a href="/LepjBe" id="belepes">
                            <input type="button" class="btn btn-warning nav-item" value="Bejelentkezés" />
                        </a>

                        <a href="/Keszites" id="sajatKoktelKeszites" hidden>
                            <input
                                type="button"
                                class="nav-item btn btn-warning mx-2"
                                value="Saját koktél létrehozása"
                            />
                        </a>
                        <div class="nav-item dropdown" id="dropdownMenu" hidden>
                            <img
                                class="nav-link dropdown-toggle profil"
                                data-bs-toggle="dropdown"
                                role="button"
                                aria-expanded="false"
                            />
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li class="dropdown-item"><a href="/Adatlap">Adatlap</a></li>
                                <li class="dropdown-item"><a href="/AdminPanel">Admin Panel</a></li>
                                <li class="dropdown-item"><a href="/Kijelentkezes">Kijelentkezes</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
        <div class="container" id="keresofelulet">
            <div class="row text-center">
                <p class="fs-1">Koktélok</p>
            </div>
            <label for="Koktelnev">Keresés</label>
            <div class="row">
                <div class="col-md-8 col-sm-8 col-lg-10 col-8">
                    <input type="text" name="" id="searchBar" class="shadow-sm" placeholder="Írja be a koktél nevét!" />
                    <button id="Searchbtn" type="button"><i class="fa fa-search"></i></button>
                </div>
                <div class="col-md-4 col-sm-4 col-lg-2 col-4">
                    <input
                        type="button"
                        class="btn btn-secondary w-100 shadow-sm"
                        data-bs-toggle="collapse"
                        data-bs-target="#parameterek"
                        aria-expanded="false"
                        aria-controls="parameterek"
                        value="Szűrés"
                        id="filter"
                    />
                </div>
                <div class="collapse mt-1" id="parameterek">
                    <div class="card card-body shadow-sm">
                        <div class="row d-flex flex-column">
                            <div class="d-flex justify-content-between flex-wrap gap-2">
                                <div class="col-12 col-sm-12 col-md-12 col-lg">
                                    <label for="Erősség">A koktél erőssége</label>
                                    <select name="" id="Erősség" class="col-2 form-select">
                                        <option value="" selected></option>
                                    </select>
                                </div>
                                <div class="col-12 col-sm-12 col-md-12 col-lg">
                                    <label for="Alap">A koktél ize</label>
                                    <select name="" id="Alap" class="col-2 form-select">
                                        <option value="" selected></option>
                                    </select>
                                </div>
                                <div class="col-12 col-sm-12 col-md-12 col-lg">
                                    <label for="Allergének">Allergének</label>
                                    <select name="Allergének" id="Allergének" class="col-2 form-select">
                                        <option value="" selected></option>
                                    </select>
                                </div>
                                <div class="col-12 col-sm-12 col-md-12 col-lg">
                                    <label for="AlkoholosE">Koktel tipusa</label>
                                    <select name="" id="AlkoholosE" class="col-2 form-select">
                                        <option value="Mindegy" selected>Mindegy</option>
                                        <option value="Alkoholos">Alkoholos</option>
                                        <option value="Alkoholmentes">Alkoholmentes</option>
                                    </select>
                                </div>
                                <div class="col-12 col-sm-12 col-md-12 col-lg">
                                    <label for="Rendezés">Rendezés</label>
                                    <select name="" id="Rendezés" class="col-2 form-select">
                                        <option value="" selected></option>
                                        <option value="Nepszeruseg novekvo">Nepszeruseg novekvo</option>
                                        <option value="Nepszeruseg csokkeno">Nepszeruseg csokkeno</option>
                                        <option value="">Legkorabban keszitett</option>
                                        <option value="">Legkesobb keszitett</option>
                                    </select>
                                </div>
                            </div>
                            <div>
                                <input
                                    type="button"
                                    id="szuresInditas"
                                    value="Szures inditasa"
                                    class="btn btn-success mt-2 w-100"
                                />
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="container mt-3">
            <div class="row justify-content-center" id="koktelSor"></div>
        </div>

        <script src="../kellékek/bootstrap-5.2.3-dist/js/bootstrap.bundle.min.js"></script>
        <script src="../kellékek/themeSwitcher.js"></script>
        <script src="../Pohárnyi - Dinamikus/PohAlc.js"></script>
        <script src="../kellékek/navBar.js"></script>
    </body>
</html>
