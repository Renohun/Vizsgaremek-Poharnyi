<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="../kellékek/bootstrap-5.2.3-dist/css/bootstrap.min.css" />
        <link rel="stylesheet" href="../kellékek/NavBar.css" />
        <link rel="stylesheet" href="../kellékek/lightTheme.css" />
        <link rel="stylesheet" href="../kellékek/universalCSS.css" />
    </head>
    <body>
        <nav class="navbar navbar-expand-lg bg-body-tertiary hatter">
            <div class="container-fluid hatter">
                <div class="navbar-brand">
                    <a class="navbar-brand" id="marka" href="#">Pohárnyi</a>
                    <p id="alszoveg">Az online koktélbár</p>
                </div>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsable">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="navbar-collapse collapse justify-content-between" id="collapsable">
                    <div class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active jelenlegi" href="/Fooldal" aria-current="page">Főoldal</a>
                        </li>
                        <li class="nav-item">
                            <a href="/Koktelok" class="nav-link">Koktelok</a>
                        </li>
                    </div>
                    <div class="navbar-nav d-flex align-items-center">
                        <input type="button" value="" id="ThemeSwitcher" />
                        <a href="/Regisztralj" id="regisztracio">
                            <input type="button" class="btn btn-secondary nav-item mx-2" value="Regisztárció" />
                        </a>
                        <a href="/LepjBe" id="belepes">
                            <input type="button" class="btn btn-warning nav-item" value="Bejelentkezés" />
                        </a>

                        <a href="/Keszites" id="sajatKoktelKeszites" hidden>
                            <input
                                type="button"
                                class="nav-item btn btn-warning mx-2"
                                value="Saját koktél létrehozása"
                            />
                        </a>
                        <div class="nav-item dropdown" id="dropdownMenu" hidden>
                            <img
                                class="nav-link dropdown-toggle profil"
                                data-bs-toggle="dropdown"
                                role="button"
                                aria-expanded="false"
                            />
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li class="dropdown-item"><a href="/Adatlap">Adatlap</a></li>
                                <li class="dropdown-item"><a href="/AdminPanel">Admin Panel</a></li>
                                <li class="dropdown-item"><a href="/Kijelentkezes">Kijelentkezes</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
        <div class="container d-flex justify-content-center">
            <div class="col-8">
                <div class="card mt-5">
                    <div class="card-body">
                        <p class="text-center fs-1 card-title">Regisztrálj a weblapunkra</p>
                        <form action="" method="post" id="formTag">
                            <div>
                                <label for="emailInp">Adj meg email címét:</label>
                                <input
                                    type="email"
                                    class="form-control mb-2"
                                    placeholder="example@gmail.com"
                                    id="emailInp"
                                    name="emailInp"
                                    required
                                />
                            </div>
                            <div>
                                <label for="felhasnzaloNev">Adja meg a felhasználónevét (Min: 3 Max: 30)</label>
                                <input
                                    type="text"
                                    class="form-control mb-2"
                                    min="3"
                                    max="30"
                                    placeholder="Felhasznalo Nev"
                                    name="felhasnzaloNev"
                                    id="felhasnzaloNev"
                                    required
                                />
                            </div>
                            <div>
                                <label for="jelszo">Adja meg a jelszavát (Min: 8 Max: 20)</label>
                                <input
                                    type="password"
                                    min="8"
                                    max="20"
                                    class="form-control mb-2 jelszoElement"
                                    name="jelszo"
                                    id="jelszo"
                                    required
                                />
                            </div>
                            <div>
                                <label for="jelszoIsmet">Ismételje meg jelszavát (Min: 8 Max: 20)</label>
                                <input
                                    type="password"
                                    min="8"
                                    max="20"
                                    class="form-control mb-2 jelszoElement"
                                    name="jelszoIsmet"
                                    id="jelszoIsmet"
                                    required
                                />
                            </div>
                            <div>
                                <input
                                    type="submit"
                                    id="RegisztracioGomb"
                                    value="Regisztráció"
                                    class="btn btn-success w-100"
                                />
                            </div>
                        </form>

                        <div>
                            <input type="checkbox" name="jelszoMutatas" id="jelszoMutatas" />
                            <label for="jelszoMutatas">Jelszo mutatasa</label>
                        </div>
                        <div>
                            <input type="checkbox" name="ASZFCheck" id="ASZFCheck" required />
                            <label for="ASZFCheck">Elfogadom az <a href="" target="_blank">ASZF</a> felteteleit</label>
                        </div>
                    </div>
                    <div class="card-footer">
                        <label for="">Van már fiókod?</label>
                        <a href="/LepjBe"><input type="button" class="btn btn-secondary" value="Bejelentkezés" /></a>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal" tabindex="-1" id="infoModal">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="text-center mt-1">
                        <h5 id="modalText"></h5>
                    </div>
                    <div class="modal-footer">
                        <input type="button" id="modalBtn" value="Rendben" class="btn btn-success w-100" />
                    </div>
                </div>
            </div>
        </div>

        <script src="../kellékek/bootstrap-5.2.3-dist/js/bootstrap.bundle.min.js"></script>
        <script src="../kellékek/themeSwitcher.js"></script>
        <script src="../Regisztráció/Regisztracio.js"></script>
        <script src="../kellékek/navBar.js"></script>
    </body>
</html>
